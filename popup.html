<!DOCTYPE html>
<html>
<head>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 360px; font-family: 'Segoe UI', system-ui, sans-serif; background: #fafafa; }
    .header { background: #1a73e8; color: white; padding: 14px 16px; }
    .header h1 { font-size: 16px; font-weight: 600; }
    .header p { font-size: 11px; opacity: 0.85; margin-top: 2px; }
    .server-config { padding: 12px 16px; background: #fff; border-bottom: 1px solid #e0e0e0; }
    .server-config label { font-size: 11px; color: #666; display: block; margin-bottom: 4px; }
    .server-config input { width: 100%; padding: 6px 8px; border: 1px solid #ddd; border-radius: 4px; font-size: 13px; }
    .server-config .save-btn { margin-top: 6px; background: #1a73e8; color: white; border: none; padding: 6px 14px; border-radius: 4px; cursor: pointer; font-size: 12px; }
    .server-config .save-btn:hover { background: #1557b0; }
    .server-config .status { font-size: 11px; margin-top: 4px; }
    .server-config .status.ok { color: #2e7d32; }
    .server-config .status.err { color: #c62828; }
    .stats { display: flex; gap: 0; border-bottom: 1px solid #e0e0e0; background: #fff; }
    .stat { flex: 1; text-align: center; padding: 12px 8px; border-right: 1px solid #e0e0e0; }
    .stat:last-child { border-right: none; }
    .stat .num { font-size: 22px; font-weight: 700; color: #1a73e8; }
    .stat .label { font-size: 10px; color: #888; text-transform: uppercase; margin-top: 2px; }
    .list { max-height: 300px; overflow-y: auto; }
    .item { padding: 10px 16px; border-bottom: 1px solid #eee; background: #fff; }
    .item:hover { background: #f5f5f5; }
    .item .to { font-size: 13px; font-weight: 600; color: #333; }
    .item .subject { font-size: 12px; color: #666; margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .item .meta { font-size: 11px; color: #999; margin-top: 4px; display: flex; justify-content: space-between; }
    .item .opens { font-weight: 600; }
    .item .opens.read { color: #1a73e8; }
    .item .opens.unread { color: #bbb; }
    .empty { padding: 32px 16px; text-align: center; color: #999; font-size: 13px; }
  </style>
</head>
<body>
  <div class="header">
    <h1>Email Tracker</h1>
    <p>Track email opens in Gmail</p>
  </div>
  <div class="server-config">
    <label>Tracking Server URL</label>
    <input type="text" id="serverUrl" placeholder="https://your-server.loca.lt" />
    <button class="save-btn" id="saveUrl">Save</button>
    <div class="status" id="serverStatus"></div>
  </div>
  <div class="stats">
    <div class="stat"><div class="num" id="totalSent">0</div><div class="label">Tracked</div></div>
    <div class="stat"><div class="num" id="totalOpened">0</div><div class="label">Opened</div></div>
    <div class="stat"><div class="num" id="totalOpens">0</div><div class="label">Total Opens</div></div>
  </div>
  <div class="list" id="list">
    <div class="empty">No tracked emails yet.<br>Compose and send an email to start tracking.</div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
